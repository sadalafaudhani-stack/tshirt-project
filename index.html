<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="order-card">
    <h2><i class="fas fa-file-invoice"></i> Order Form</h2>
    <form id="orderForm" action="https://formspree.io/f/xvzvrvyj" method="POST">
        
        <div class="form-group">
            <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label for="userName"><i class="fas fa-at"></i> Username</label>
            <input type="text" id="userName" name="userName" placeholder="e.g., GokuFan9000" required>
        </div>

        <div class="form-group">
            <label for="size"><i class="fas fa-tshirt"></i> T-Shirt Size</label>
            <select id="size" name="size" required>
                <option value="" disabled selected>Choose size</option>
                <option value="S">Small</option>
                <option value="M">Medium</option>
                <option value="L">Large</option>
                <option value="XL">Extra Large</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-palette"></i> T-Shirt Color</label>
            <div class="color-options">
                <label class="color-item"><input type="radio" name="shirtColor" value="Black" required> Black</label>
                <label class="color-item"><input type="radio" name="shirtColor" value="White"> White</label>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-images"></i> Select Design Card</label>
            <div class="image-grid">
                <label class="card-option">
                    <input type="radio" name="selectedImage" value="goku_stance" required>
                    <img src="download (1).jfif" alt="Goku Stance">
                </label>
                
                <label class="card-option">
                    <input type="radio" name="selectedImage" value="supersaiyan">
                    <img src="download.jfif" alt="Super Saiyan">
                </label>
                
                <label class="card-option">
                    <input type="radio" name="selectedImage" value="kamehameha">
                    <img src="Money.jfif" alt="Kamehameha">
                </label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Send My Order</button>
    </form>
</div>
</body>
</html>
